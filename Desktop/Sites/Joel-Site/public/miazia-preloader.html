<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miazia - Italian Restaurant</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍝</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
            cursor: none;
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 15px;
            height: 15px;
            border: 2px solid #D4AF37;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.1s ease;
            transform: translate(-50%, -50%);
        }

        .cursor-follower {
            position: fixed;
            width: 35px;
            height: 35px;
            border: 1px solid #D4AF37;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
            opacity: 0.5;
        }

        .cursor.active {
            transform: translate(-50%, -50%) scale(2);
        }

        /* Preloader Container */
        .preloader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1810 100%);
        }

        /* Background Image */
        .bg-image {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                        url('CP0031_-scaled.jpg') center/cover;
            animation: zoomIn 20s ease-out infinite;
        }

        @keyframes zoomIn {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Content */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* Logo */
        .logo {
            font-size: 1.5rem;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
        }

        /* Restaurant Name */
        .restaurant-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 700;
            color: #D4AF37;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            opacity: 0;
            transform: translateY(50px);
            animation: fadeInUp 1.2s ease-out 0.8s forwards;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.4);
        }

        /* Tagline */
        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            color: #FFF8DC;
            margin-bottom: 4rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.2s ease-out 1.2s forwards;
        }

        /* Enter Prompt */
        .enter-prompt {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: #D4AF37;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            padding: 1rem 3rem;
            border: 2px solid #D4AF37;
            background: rgba(212, 175, 55, 0.1);
            opacity: 0;
            animation: fadeInPulse 2s ease-in-out 2s infinite;
            cursor: none;
            transition: all 0.3s;
        }

        .enter-prompt:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            transform: scale(1.05);
        }

        .hint {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: rgba(212, 175, 55, 0.6);
            opacity: 0;
            animation: fadeIn 1s ease-out 2.5s forwards;
        }

        /* Animations */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInPulse {
            0%, 100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }

        /* Loaded State */
        body.loaded .preloader {
            animation: fadeOut 0.8s ease-out forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            body {
                cursor: auto;
            }
            .cursor, .cursor-follower {
                display: none;
            }
            .restaurant-name {
                font-size: 3rem;
            }
            .tagline {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <!-- Preloader -->
    <div class="preloader">
        <div class="bg-image"></div>
        <div class="content">
            <div class="logo">🍝</div>
            <h1 class="restaurant-name">MIAZIA</h1>
            <p class="tagline">Italian Cuisine</p>
            <div class="enter-prompt" id="enterBtn">
                Enter Restaurant
            </div>
            <p class="hint">Click anywhere or press any key</p>
        </div>
    </div>

    <script>
        // Custom Cursor
        const cursor = document.querySelector('.cursor');
        const cursorFollower = document.querySelector('.cursor-follower');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;
        let followerX = 0, followerY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 1;
            cursorY += (mouseY - cursorY) * 1;
            followerX += (mouseX - followerX) * 0.1;
            followerY += (mouseY - followerY) * 0.1;

            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            cursorFollower.style.left = followerX + 'px';
            cursorFollower.style.top = followerY + 'px';

            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Cursor hover effect
        document.querySelector('.enter-prompt').addEventListener('mouseenter', () => {
            cursor.classList.add('active');
        });
        document.querySelector('.enter-prompt').addEventListener('mouseleave', () => {
            cursor.classList.remove('active');
        });

        // Enter Restaurant
        function proceed() {
            document.body.classList.add('loaded');
            setTimeout(() => {
                window.location.href = '/miazia-menu.html';
            }, 800);
        }

        // Click to enter
        document.addEventListener('click', proceed);

        // Keyboard to enter
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                proceed();
            }
        });
    </script>
</body>
</html>
